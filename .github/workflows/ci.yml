name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: flake8 src tests run_pipeline.py --max-line-length=100

  test:
    name: test
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - name: Suite de pruebas con cobertura
        run: |
          mkdir -p reports
          pytest -m "not datos" --cov=src --cov-fail-under=85 --junitxml=reports/junit.xml
      - name: Publicar junit.xml como artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-report
          path: reports/junit.xml

  datos:
    name: datos
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - name: Checks de calidad de datos
        run: pytest -m datos
      - name: Ejecutar el pipeline
        run: python run_pipeline.py --input data/transacciones.csv --output output/ingresos_categoria.csv
      - name: Publicar resumen.json en el Job Summary
        if: always()
        shell: bash
        run: |
          echo "### Resumen de la ejecución del pipeline" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          cat output/resumen.json >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
      - name: Publicar output/ como artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-output
          path: output/
